# Local dev Postgres with pgvector (alternative to Supabase).
# Usage: docker compose up -d
# Then set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/codebase_rag
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codebase_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
