# Render blueprint: connect the repo on render.com and it picks this up.
services:
  - type: web
    name: codebase-rag-api
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
